<!DOCTYPE html>
<html>
<head>
  <title>POS Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    :root {
      --clr-900: #001219;
      --clr-800: #005F73;
      --clr-700: #0A9396;
      --clr-400: #94D2BD;
      --clr-cream: #E9D8A6;
      --clr-red2: #AE2012;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--clr-900) 0%, #003d4f 50%, var(--clr-800) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    /* Subtle dot grid pattern on background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(148,210,189,0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    /* BRAND HEADER above card */
    .brand-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .brand-logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--clr-700), var(--clr-400));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 14px;
      box-shadow: 0 4px 16px rgba(10,147,150,0.35);
    }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
      letter-spacing: 0.5px;
    }

    .brand-sub {
      font-size: 0.82rem;
      color: var(--clr-400);
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* LOGIN CARD */
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 36px 32px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .login-card h5 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--clr-900);
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .form-label {
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--clr-900);
      margin-bottom: 6px;
    }

    .input-group-icon {
      position: relative;
    }

    .input-group-icon .icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.95rem;
      color: #94a3b8;
      pointer-events: none;
    }

    .input-group-icon input {
      padding-left: 38px;
      border-radius: 10px !important;
      border: 1.5px solid #d0dce6;
      padding-top: 11px;
      padding-bottom: 11px;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-group-icon input:focus {
      border-color: var(--clr-700);
      box-shadow: 0 0 0 3px rgba(10,147,150,0.15);
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--clr-800), var(--clr-700));
      border: none;
      color: white;
      border-radius: 10px;
      padding: 13px;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, var(--clr-900), var(--clr-800));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,95,115,0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-box {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: var(--clr-red2);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* FOOTER below card */
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.75rem;
      color: rgba(148,210,189,0.6);
    }

    /* Divider line inside card */
    .card-divider {
      border: none;
      border-top: 1.5px solid #f0f4f8;
      margin: 20px 0;
    }
  </style>
</head>
<body>

  <div class="login-wrapper">

    <!-- BRAND -->
    <div class="brand-header">
      <div class="brand-logo">🛒</div>
      <div class="brand-name">POS System</div>
      <div class="brand-sub">Multi-Shop Point of Sale</div>
    </div>

    <!-- CARD -->
    <div class="login-card">
      <h5>Welcome back 👋</h5>
      <p>Sign in to continue to your dashboard</p>

      {% if error %}
      <div class="error-box">⚠️ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group-icon">
            <span class="icon">👤</span>
            <input type="text" name="username" placeholder="Enter your username" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group-icon">
            <span class="icon">🔒</span>
            <input type="password" name="password" placeholder="Enter your password" required>
          </div>
        </div>

        <button type="submit" class="btn-login">Login →</button>
      </form>

      <hr class="card-divider">
      <p style="font-size:0.78rem; color:#94a3b8; text-align:center; margin:0;">
        Contact your administrator if you forgot your credentials.
      </p>
    </div>

    <!-- FOOTER -->
    <div class="login-footer">
      © 2026 POS System · All rights reserved
    </div>

  </div>

</body>
</html>

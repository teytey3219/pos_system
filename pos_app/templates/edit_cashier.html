<!DOCTYPE html>
<html>
<head>
  <title>Edit Cashier</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">✏️ Edit Cashier</span>
    <div>
      <a href="/admin/cashiers" class="btn btn-outline-light btn-sm me-2">← Back to Cashiers</a>
      <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>
  </nav>

  <div class="container mt-4" style="max-width: 500px;">
    <div class="card p-4">
      <h5 class="mb-4">✏️ Edit Cashier</h5>

      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="full_name" class="form-control"
                 value="{{ cashier['full_name'] or '' }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control"
                 value="{{ cashier['username'] }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Assigned Shop</label>
          <select name="shop_id" class="form-select" required>
            {% for shop in shops %}
            <option value="{{ shop['id'] }}"
              {{ 'selected' if shop['id'] == cashier['shop_id'] else '' }}>
              {{ shop['name'] }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-4">
          <label class="form-label">New Password
            <small class="text-muted">(leave blank to keep current)</small>
          </label>
          <input type="password" name="new_password" class="form-control"
                 placeholder="Enter new password or leave blank">
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success w-100">💾 Save Changes</button>
          <a href="/admin/cashiers" class="btn btn-secondary w-100">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
